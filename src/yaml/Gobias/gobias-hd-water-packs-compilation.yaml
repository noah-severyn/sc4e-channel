      - value: "Seto-Inland-Sea-Water"
        description: Select to install the Seto Inland Sea Water
      - value: "Cape-Cod-Bay-Water"
        description: Select to install the Cape Cod Bay Water
      - value: "Mississippi-River-Water"
        description: Select to install the Mississippi River Water
      - value: "Caribbean-Sea-Water"
        description: Select to install the Caribbean Sea Water  
      - value: "Inside-Passage-Water"
        description: Select to install the Inside Passage Water
      - value: "Chicago-River-Water"
        description: Select to install the Chicago River Water     
      - value: "Loch-Lomond-Water"
        description: Select to install the Loch Lomond Water
  - variantId: gobias:berner-oberland:snow-line-patch
    description: Set the maximum elevation to optimize climate parameters
    values:
      - value: "None"
        description: Select this option if you haven't installed the Berner Oberland Terrain Mod (Recommended settings if you haven't installed the Berner Oberland Terrain Mod)    
      - value: "High"
        description: Set the snow line at a High Altitude
      - value: "Low"
        description: Set the snow line at a Low Altitude

