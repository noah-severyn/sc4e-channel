info:
  summary: Gobias HD Water Packs
  description: |
    A pack of water textures created by Gobias and compatible with the settings of Gobias's Terrain mods
  warning: |-
    Requires DirectX Hardware Rendering Mode for Graphics. Will CTD with Software Rendering Mode and/or on macOS.  
  author:  Gobias
  websites:
    - https://www.sc4evermore.com/index.php/downloads/download/37-terrain-mods-and-tree-controllers/431-sc4d-lex-legacy-gobias-hd-water-packs-compilation

  images:
    - https://www.sc4evermore.com/images/jdownloads/screenshots/11.JPG

assets:
  - assetId: gobias-hd-water-packs-compilation
    withConditions:
      - ifVariant: { gobias:water:type: "Staten-Island-Water" }
        include:
          - "/GB Staten Island Water.dat"
      - ifVariant: { gobias:water:type: "Bodensee-Water" }
        include:
          - "/GB Bodensee Water.dat"
      - ifVariant: { gobias:water:type: "Seto-Inland-Sea-Water" }
        include:
          - "/GB Seto Inland Sea Water.dat"
      - ifVariant: { gobias:water:type: "Cape-Cod-Bay-Water" }
        include:
          - "/GB Cape Cod Bay Water.dat"  
      - ifVariant: { gobias:water:type: "Mississippi-River-Water" }
        include:
          - "/GB Mississippi River Water.dat"
      - ifVariant: { gobias:water:type: "Caribbean-Sea-Water" }
        include:
          - "/GB Caribbean Sea Water.dat"            
      - ifVariant: { gobias:water:type: "Inside-Passage-Water" }
        include:
          - "/GB Inside Passage Water.dat"
      - ifVariant: { gobias:water:type: "Chicago-River-Water" }
        include:
          - "/GB Chicago River Water.dat"  
      - ifVariant: { gobias:water:type: "Loch-Lomond-Water" }
        include:
          - "/GB Loch Lomond Water.dat"    
      - ifVariant: { gobias:berner-oberland:snow-line-patch: "None" }          
      - ifVariant: { gobias:berner-oberland:snow-line-patch: "High" }
        include:
          - "/BO Properties UPDATED High Alt.dat"
      - ifVariant: { gobias:berner-oberland:snow-line-patch: "Low" }    
        include:
          - "/BO Properties UPDATED Low Alt.dat"          
          
variantInfo:
