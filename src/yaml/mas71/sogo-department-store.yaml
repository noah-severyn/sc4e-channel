    | **Compatibility:** | This download is only compatible with **SimCity4 RushHour** or **SimCity4 Deluxe**. |
    | **Installation:** | **Installation:**  Copy/Extract the MAS71 and/or CAM\* parent folders into your Plugins. If you've extracted the ~Documents folder you may remove it from the Plugins, but keep it in a safe location.  <br>\*Bear in mind, that with the Project ZIP efforts the CAM (Colossus Addon Mod) related LOTs are having a dedicated folder for now on (see file paths below).  <br>**  <br>Un-Installing:** To un-install the files, simply bulldoze every lot from this download in your cities and delete the files from the plugins folder afterwards.  <br>  <br>To avoid conflicts, please, it is highly recommended to use any of the third party cleanitol tools and remove any previous versions from your plugins. In the ~Documents folder in the main ZIP you can find cleanitol script file and by using either the newer [nos.17's SC4 Cleanitol](https://community.simtropolis.com/files/file/35790-sc4-cleanitol/) or the older [BSC Cleanitol](https://sc4evermore.com/index.php/downloads/download/30-gameplay-utilities/18-bsc-cleanitol) tool you can search and remove old and outdated versions of these files |
    | **File Paths:** | Lot and Dat Files: **/My Docs/Simcity 4/Plugins/MAS71/SOGO/  <br>  <br>**CAMeLot Lot Files: **/My Docs/Simcity 4/Plugins/CAM/MAS71/SOGO/**  <br>Readme and JPGs: **/~Documents/MAS71\_Readmes/SOGO** |
    | **Dependencies:** | To ensure the proper functionality, make sure the files mentioned below are installed in the plugins folder.<br><br>*   [SC4D LEX Legacy - BSC Common Dependencies Pack v9c](https://sc4evermore.com/index.php/downloads/download/22-dependencies/3-sc4d-lex-legacy-bsc-common-dependencies-pack) (and above)<br><br>*   BSC Essentials<br>*   BSC MEGA Props SG Vol01 v4<br>*   BSC MEGA Props CP Vol01<br>*   BSC MEGA Props CP Vol02<br>*   BSC Textures Vol01<br><br>*   [MAS71 MEGA Prop Pack vol01 - Misc](/index.php/downloads/download/22-dependencies/87-mas71-mega-prop-pack-vol01-misc)<br>*   [Colossus Addon Mod](/index.php/downloads/download/26-gameplay-mods/51-colossus-addon-mod-version-2-1-0-windows-by-invisichem) |

    |     |     |
    | --- | --- |
    | **Night lighting:** | In order to see the night lighting, you must install the [EP1-Update 1](http://simcity.ea.com/update/index_update.php) for Rush Hour/Sim City 4 Deluxe, and then afterwards, install the [SC4-Update](http://simcity.ea.com/coolstuff/bat/index.php) for night lighting (note: you have to be logged in in order to see the download link). If this update isn't installed, you won't see any lighting effects on custom BAT buildings. |
    | **Disclaimer:** | The usage of this download is on your own risk. I try to test my lots extensively, so they should work properly, but errors may still exist. Feel free to modify the lots for yourself and show them in your city journals, but please don't distribute them without asking first. |
