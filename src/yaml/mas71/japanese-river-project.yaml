group: mas71
name: japanese-river-project
version: "2"
subfolder: 660-parks
info:
  summary: "A canal set featuring wide sloped banks"
  author: "Mas'71"
  description: |-
    This SC4 Devotion LEX Legacy Pack features the Japanese River Project (JRP) canal set by MAS71 (including the Suburban Canal Set and MAS71 MEGA Props Vol 02), which had been available on the Lot Exchange (LEX) at SC4 Devotion. After battling a number of technical issues, software incompatibility ultimately shuttered the LEX (at least in its familiar form from 2007 onward) in June 2023, and this package is designed to collect these dependencies in an easy-to-use form, allowing users to install them all in one go, or carefully select exactly which packs they wish to install.

    ## Contents
    This package contains the following former LEX downloads:
    - JRP-Core Lot Pack
    - JRP-Addon Lot Pack 1
    - JRP-Addon Lot Pack 2

    The Lots may be found under the Seaports menu.

    The source model files, originally available for download on the LEX, can be found in the [SC4D LEX Legacy - 3DSMAX & GMAX Models Pack](https://www.sc4evermore.com/index.php/downloads/download/8-other/67-sc4d-lex-legacy-3dsmax-gmax-models-pack).

    ## CREDITS:

    The following members contributed models, textures, and modding support to this collection:

        MAS71

    This package has been made possible by the Project ZIP efforts of Tyberius06, and was assembled by Tarkus.
    
    ### Special Thanks

    Webmaster & administration staff at SC4 Devotion.

    And possibly others who may not have been mentioned. If your name has been forgotten or you're not on the list, then drop us a line, as it has been difficult to keep track of anyone/everyone that may of helped somewhere along the lines.

    And to the community itself, we would also like to thank you for your support, making mods such as this possible too. We're still at it after 20 years thanks to you!

    And last but not least, a thanks for the Maxis individuals too, for the [paid] work that they did. ;-)
  images:
    - https://www.sc4evermore.com/images/jdownloads/screenshots/jrp_013.jpg
    - https://www.sc4evermore.com/images/jdownloads/screenshots/jrp_alp2_11.jpg
  website:
    - https://www.sc4evermore.com/index.php/downloads/download/14-park/152-sc4d-lex-legacy-mas71-japanese-river-project-jrp
dependencies:
  - mas71:mega-props-vol02
  - bsc:mega-props-sg-vol01
  - bsc:textures-vol01
assets:
  - assetId: "sc4d-lex-legacy-mas71-japanese-river-project-jrp"
    exclude:
      - "/@4Suburban Canal/"
      - "/@1^Props Pack#/"

