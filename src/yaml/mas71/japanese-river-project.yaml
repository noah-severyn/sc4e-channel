group: "mas71"
name: "mega-props-vol02"
version: "2"
subfolder: "100-props-textures"
info:
  summary: "Repackaged props for `pkg=mas71:japanese-river-project` and `pkg=mas71:suburban-canal-set`"
  author: "Mas71"
  images:
    - https://www.sc4evermore.com/images/jdownloads/screenshots/jrp_013.jpg
    - https://www.sc4evermore.com/images/jdownloads/screenshots/jrp_alp2_11.jpg
    - https://www.sc4evermore.com/images/jdownloads/screenshots/Suburban%20Canal%20Addon1_01.jpg
  website:
    - https://www.sc4evermore.com/index.php/downloads/download/14-park/152-sc4d-lex-legacy-mas71-japanese-river-project-jrp
assets:
  - assetId: "sc4d-lex-legacy-mas71-japanese-river-project-jrp"
    include:
      - "/03_JRPSC prop_Option Gurdrail 01.dat"
    withConditions:
      - ifVariant: { mas71:suburban-canal-set:tree-type: maxis, mas71:japanese-river-project:fence-color: white }
        include:
          - "/@4Lot Set - MAXIS tree/"
          - "/=White/"
      - ifVariant: { mas71:suburban-canal-set:tree-type: maxis, mas71:japanese-river-project:fence-color: black }
        include:
          - "/@4Lot Set - MAXIS tree/"
          - "/-Black/"
      - ifVariant: { mas71:suburban-canal-set:tree-type: maxis, mas71:japanese-river-project:fence-color: green }
        include:
          - "/@4Lot Set - MAXIS tree/"
          - "/-Green/"
      - ifVariant: { mas71:suburban-canal-set:tree-type: porkissimo, mas71:japanese-river-project:fence-color: white }
        include:
          - "/@5!Lot Set - PORKISSIMO tree/"
          - "/=White/"
        dependencies:
          - porkissimo:jenx-porkie-expanded-porkie-props
      - ifVariant: { mas71:suburban-canal-set:tree-type: porkissimo, mas71:japanese-river-project:fence-color: black }
        include:
          - "/@5!Lot Set - PORKISSIMO tree/"
          - "/-Black/"
        dependencies:
          - porkissimo:jenx-porkie-expanded-porkie-props
      - ifVariant: { mas71:suburban-canal-set:tree-type: porkissimo, mas71:japanese-river-project:fence-color: green }
        include:
          - "/@5!Lot Set - PORKISSIMO tree/"
          - "/-Green/"
        dependencies:
          - porkissimo:jenx-porkie-expanded-porkie-props
      - ifVariant: { mas71:suburban-canal-set:tree-type: simfox, mas71:japanese-river-project:fence-color: white }
        include:
          - "/@6!Lot Set - SIMFOX tree/"
          - "/=White/"
        dependencies:
          - simfox:treepack-vol02
      - ifVariant: { mas71:suburban-canal-set:tree-type: simfox, mas71:japanese-river-project:fence-color: black }
        include:
          - "/@6!Lot Set - SIMFOX tree/"
          - "/-Black/"
        dependencies:
          - simfox:treepack-vol02
      - ifVariant: { mas71:suburban-canal-set:tree-type: simfox, mas71:japanese-river-project:fence-color: green }
        include:
          - "/@6!Lot Set - SIMFOX tree/"
          - "/-Green/"
