---
group: nam
name: moonlight-shinkansen-mod
version: "1.0.0"
subfolder: 900-overrides
info:
  summary: NAM Legacy - Moonlight's Shinkansen Mod
  description: |
    This MOD changes the appearance of the monorail network into a Japanese style Shinkansen with elevated concrete pillars. Previous versions exist, known as the Bullet Train Mod (BTM), however as of this release the name has been changed to Shinkansen Mod, to differentiate it from the older and very out of date releases.
  author: NAM Team, Moonlight, MGB204
  websites:
    - https://www.sc4evermore.com/index.php/downloads/download/6-network-addon-mod-nam/457-nam-legacy-moonlights-shinkansen-mod

  images:
    - https://www.sc4evermore.com/images/jdownloads/screenshots/BridgesTunnel.jpg
    - https://www.sc4evermore.com/images/jdownloads/screenshots/optCat.jpg
    - https://www.sc4evermore.com/images/jdownloads/screenshots/Shinkansen.jpg

dependencies:
  - plundere:catenary-essentials
  - moonlight:shinkansen-n700-automata

assets:
  - assetId: nam-legacy-moonlight-shinkansen-mod
    include:
    - "/ML Shinkansen MOD Base.dat"
    - "/ML Shinkansen MOD Bridges and Tunnels.dat"
    - "/ML Shinkansen MOD Crossings.dat"
    - "/ML Shinkansen MOD CrossingsNWM.dat"
    - "/ML Shinkansen MOD CrossingsRHW.dat"
    - "/ML Shinkansen MOD CrossingsSAM.dat"
    - "/ML Shinkansen MOD WRCs.dat"
    - "/ML Shinkansen MOD T21 Catenaries.dat"
    withConditions:
      - ifVariant: { moonligth:btm:concrete: "cool" }
        include:
          - "/ML Shinkansen MOD Concrete Cool Hue.dat"
      - ifVariant: { moonligth:btm:concrete: "warm" }
        include:
          - "/ML Shinkansen MOD Concrete Warm Hue.dat"
      - ifVariant: { moonligth:btm:fence: "yes" }
        include:
          - "/ML Shinkansen MOD Fence.dat"
      - ifVariant: { moonligth:btm:fence: "no" }
      - ifVariant: { moonligth:btm:ground-texture: "yes" }
        include:
          - "/ML Shinkansen MOD Ground Texture.dat"
      - ifVariant: { moonligth:btm:ground-texture: "no" }
        include:
          - "/ML Shinkansen MOD no Ground Texture.dat"
      - ifVariant: { nam:maxis-highway:style: "default" }
      - ifVariant: { nam:maxis-highway:style: "MHO" }
        include:
          - "/ML Shinkansen MOD for MHO.dat"
      - ifVariant: { moonligth:btm:jp-elrail: "yes" }
        include:
          - "/ML Shinkansen MOD for ML Jpn El-Rail.dat"
      - ifVariant: { moonligth:btm:jp-elrail: "no" }

variantInfo:
  - variantId:  moonligth:btm:concrete
    description: Choose the color of the concrete
    values:
      - value: "cool" 
        description: Concrete with a cool color
      - value: "warm"
        description: Concrete with a warm color
  - variantId: moonligth:btm:fence
    description: Select the fences option
    values:
      - value: "yes"
        description: Install the fences
      - value: "no"
        description: Do not install the fences
  - variantId: moonligth:btm:ground-texture
    description: Select the ground texture option
    values:
      - value: "yes"
        description: Install the Ground Texture
      - value: "no"
        description: Do not install the Ground Texture
  - variantId: moonligth:btm:jp-elrail
    description: Select the Crosslink JP El-Rail option
    values:
      - value: "yes"
        description: Install the Crosslink JP El-Rail support file
      - value: "no"
        description: Do not install the Crosslink JP El-Rail support file
---
