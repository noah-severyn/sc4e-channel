version: "1.0.0"
subfolder: 300-commercial
info:
  summary: Kitty's Clothes, part of the Smalltown, USA series
  description: |-
    Kitty Manchester was a woman born well before her time. In the days when women's bathing suits resembled dresses and the word "pants" was still considered profanity across the pond in England, she was selling sleeveless blouses and printed t-shirts. She was also the first person to anyone's recollection who purposely spelled things incorrectly as a means of marketing. Her shop opened in a small Victorian building during the fall of 1908 and the business has done well ever since, although it has caused several minor scandals over the years. Today, the shop remains in the family and is still as progressive as ever. To my knowledge it is the first and only store in the United States to carry the full line of Tripwired apparel.

    With Kitty's Klothes, the Smalltown, USA Series officially turns twenty-one!  We'll be having drinks next door at Fire Sticks for anyone that cares to join the celebration. This package contains both growable and ploppable versions of the building. Enjoy!

