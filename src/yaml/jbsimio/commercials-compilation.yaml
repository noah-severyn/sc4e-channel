version: "1"
subfolder: 300-commercial
info:
  summary: "The Brooks Building, a SHUR Project release"
  description: |-
    This is the eleventh release in the Skipjack Historical Urban Restoration Project. Learn more about the history of this project [here](http://www.simtropolis.com/forum/messageview.cfm?catid=37&threadid=76703&STARTPAGE=14). When completed in 1913, the Brooks Building was the tallest building in town at 12 stories. Its title was short lived, but still significant as it spurred a friendly (and at times not so friendly) competition resulting in a construction boom for the city's downtown core. Brooks Department Store was well established in the area when the need for more office space became a necessity. Albert Brooks was very specific in his demands for good lighting in both the retail and office areas. The result was a long slender tower with three levels of shopping space topped by plenty of sunlit offices above. The Brooks Building fell out of use and into disrepair as shopping centers drew the customers further and further from the city.

    Citing the one time title of "Midland's Tallest Building," the Skipjack Historical Society purchased the condemned building in 1997 and set about to restore it. The utility block on the roof had been so weather beaten and vandalized that it ultimately had to be replaced, but the rest of the building's exterior character was carefully brought back over the next two years. With the city's recent rebirth, the Brooks Building once again became a desirable office building and is well on the road to making a full recovery.

    This release contains two lot versions. There is a 1x3 stage seven growable with CO$$ jobs and also a functioning ploppable version with a plop cost of $7300. All the other statistics are the same as the growable. Enjoy!

