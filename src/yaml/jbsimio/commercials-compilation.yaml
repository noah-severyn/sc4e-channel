info:
  summary: The Taft Building, a SHUR Project release
  description: |-
    This is the fifth release in the Skipjack Historical Urban Restoration Project. Learn more about the history of this project [here](http://www.simtropolis.com/forum/messageview.cfm?catid=37&threadid=76703&STARTPAGE=14). Originally built as a hotel, this structure has anchored its street corner since 1924. As was the case with so many urban hotels, business waned in the 1960's when the freeway came through town too far north to make it a convenient place to sleep. The building sat vacant for a number of years. Researchers at the Skipjack Historical Society discovered evidence that President Taft had once stayed in an upper room of the building and began their drive to save the building from further decay. After months of cleaning, street level shops opened and breathed new life into the building. The upper floors were slowly converted into offices and apartments and the building was given a new name in honor of its presidential ties.

    The Taft Building is inspired by a building on the corner of Hollywood and Vine in Hollywood, California. (it's real name is unknown, but the building across the street had the name Taft, so that's what was chosen). This release includes four versions. There are growable CO$$, CS$$, and R$$. There is also a ploppable CO$$ version (plop cost is $5100) with the same statistics as the growable version.

