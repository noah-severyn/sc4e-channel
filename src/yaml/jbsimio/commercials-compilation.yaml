    This is the nineth release in the Skipjack Historical Urban Restoration Project. Learn more about the history of this project here. The Swan Majectic hotel has catered to countless prestigious or just rich plain guests over the years. Looming over Skipjack Park, the fourteenth floor penthouse suites provide some gorgeous views from its balconies. The front lobby and both hotel restaurants are considered to be some of the most lavish in the area. The hotel itself has been so popular since its founding, that the Swan brand name has expanded into a local chain of hotels.

