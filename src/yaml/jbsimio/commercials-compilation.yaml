  summary: The Swan Majestic, a SHUR Project release
  description: |-
    This is the nineth release in the Skipjack Historical Urban Restoration Project.  Learn more about the history of this project here.  The Swan Majectic hotel has catered to countless prestigious or just rich plain guests over the years.  Looming over Skipjack Park, the fourteenth floor penthouse suites provide some gorgeous views from its balconies.  The front lobby and both hotel restaraunts are considered to be some of the most lavish in the area.  The hotel itself has been so popular since its founding, that the Swan brandname has expanded into a local chain of hotels.

    This is one of the few SHUR Projects that was never a project.  The building never needed to be rescued from decay or the wrecking ball.  The family owners of the hotel have held their own sense of history for generations, and members of the current generation played key roles in founding the Skipjack Historical Society and continue to be active in the preservation projects throughout the city.  Because of this involvement, the Swan Majestic hotel is listed in the SHUR portfolio as a token of appreciation.

