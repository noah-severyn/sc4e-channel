name: hunter-dulin-building
version: "1.0.0"
subfolder: 300-commercial
info:
  summary: The Hunter-Dulin Building, a SHUR Project release
  description: |-
    This is the fifteenth release in the Skipjack Historical Urban Restoration Project.  Learn more about the history of this project here.

    The Hunter-Dulin Building was completed and opened for occupancy in 1927. It would serve as the West Coast headquarters for the National Broadcasting Company for the next fifteen years. At 24 stories (94.0 m), this was one of the city's tallest buildings upon its completion. It is set apart from other San Francisco skyscrapers by its steep mansard roof with gabled dormers and terra cotta roof tiles.  The Los Angeles investment firm of Hunter, Dulin & Company bought the site in 1925 for a price estimated to have been well in excess of $1 million and hired the New York firm of Schultze and Weaver to design an office building for them. Leonard Schultze was chief of design for New York's Grand Central Terminal, and with his partner, Spencer Fullerton Weaver, designed a number of the most extravagant hotels built during the 1920s, including the Pierre, the Sherry Netherlands, and the Waldorf Astoria in New York along with the Breakers in Palm Beach.

    The Hunter-Dulin Building is a tripartite French Renaissance Revival structure clad with sand-coloured Granitex on its primary façades and brick on the others. The shaft rises to an elaborate gabled mansard roof of terra-cotta tile with copper-coated cresting. The ornamentation is particularly elaborate, with flower and bird designs, medallions representing the four seasons, and the heads of men facing each other in some of the window alcoves. The building's most famous tenant was Dashiell Hammett's fictitious detective, Sam Spade.

    The three part vertical composition was detailed in what, by 1926 standards was considered a rather backward looking stylistic mix of Romanesque and French Chateau ornamentation. Nevertheless, it is an extremely fine version and the city's only example of this style. The base and main office shaft, clad in a particularly fine Granitex, is designed in a rather attenuated version of the Romanesque. Above this is a set-back continuation of the shaft crowned by a high, red, dormered mansard roof with copper cresting. It is this roof which is one of the richest features on the city's skyline. The giant ground level entrance arch leads into a richly detailed elevator lobby.

    This release contains two lot versions.  First is a 6x4 stage seven growable with CO$$$ jobs.  There is also a funtional plop version of the same with a plop cost of $23,000.  Both lots are designed for a very urban setting and will look best when taking up an entire city block.  As always, you can safely delete any LOT versions you don't need, just be sure to keep the MODEL file.  Enjoy!

