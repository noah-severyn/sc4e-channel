subfolder: 300-commercial
info:
  summary: Tiffany's Tea Shop, part of the Smalltown, USA series
  description: |-
    Tiffany Green had been a tea lover all her life. Her husband, a banker of rather substantial means, indulged her habit as much as he could even though he personally couldn't stand the stuff. After years of suppers accompanied by tea, he could take no more and set out to find another outlet for his wife's passion. He contracted to have a building erected in 1911 and helped Tiffany to set up a shop of her own where she could brew, drink, and sell tea to her heart's content. The shop flourished and has been handed down through the generations ever since. Beyond selling exotic teas and fine china cups, the shop has grown into a small restaurant  that may soon rival Emma's Coffee Shop as the place to meet in Smalltown. I do remember having breakfast at Tiffany's and, as I recall, I kind of liked it.

