subfolder: 300-commercial
info:
  summary: The Jurst Building, a SHUR Project release
  description: |-
    This is the tenth release in the Skipjack Historical Urban Restoration Project.  Learn more about the history of this project here.  The Hurst Building was commissioned by Dr. Jeffrey Hurst and constructed in 1913.  Dr. Hurst had a fairly sizable practice at the time which occupied the lower three floors of the building.  (He had actually made several business deals with the Weatherwax Pharmacy, but that's an entirely different story.)  The remaining floors were leased as office space to other companies and professionals.  Sadly, while paying so much attention to the health of his patients, Dr. Hurst ignored his own and fell quite ill with a host of medical problems.  The inability of other doctors in his offices to help cure him destroyed the reputation of the practice and the vacancies within the building began.
  
    The Hurst Building became part of the SHUR Project  during the Society's efforts to save the Stearns Building from becoming a parking garage.   Although the Stearns Building needed little restoration, the Hurst Building had become an eyesore and was slowly becoming structurally unsound.  Local developers felt the Hurst Building was beyond saving and that the Stearns Building was just in the way.  Underestimating the Skipjack Historical Society, the city made a deal stating that if the group could make the necessary repairs within the allotted time, both buildings could be purchased together as a package deal and the parking garage would be relocated.   Jessica Maloney, the daughter of Swan Hotel Group founder Herbert Maloney, took a personal interest in the issue.  The Swan Group made sizable financial contributions, and with their influence, the necessary repairs and updates were completed months ahead of schedule.  Don't you just love a happy ending?  Especially one that sticks it to the man at the same time?

