group: "jbsimio"
name: weathermax-pharmacy
version: "1.0.0"
subfolder: 300-commercial
info:
  summary: Weathermax Pharmacy, part of the Smalltown, USA series
  description: |-
    Esme Weatherwax developed a reputation in Smalltown long before she ever set up shop as a pharmacist. Her quick temper, stern gazes, and sharp tongue struck fear in anyone she passed on the streets. Many children in town even called her a witch. Despite these seemingly rude and unfriendly characteristics, she had an amazing ability to convince people of nearly anything she wanted them to believe. (Perhaps the witch theory had some credibility after all. That is not part of our story and we'll probably never really know anyway.)  A local young doctor who was just setting up his practice noticed this quality and approached Esme with a rather questionable idea. He proposed to set  up his offices above a pharmacy which he would also own while Esme would keep shop and sell the medicines that he prescribed. With her powers of persuasion, the doctor believed that she could make his patients feel better even if the medicines didn't work. Esme agreed and, being a very ambitious (and egotistical) woman, the pharmacy thrived. All the patients raved about the new doctor. The pharmacy did so well that Esme eventually bought the doctor out and made it her own shop. The name has remained and continues to inspire trust even to this day.

    Weatherwax Pharmacy is the twentieth release in the Smalltown, USA Series. This package contains both growable and ploppable versions for CO$$ or CS$$. There is also a Clinic version which can be found in the Health menu. Enjoy!
