name: spean-bridge-commando-memorial
version: "1"
subfolder: 660-parks
info:
  summary: Spean Bridge Commando Memorial
  description: |-
    The world famous Commando Memorial stands proudly high above Spean Bridge. The three gigantic bronze figures stand proud in battledress, woolen caps and climbing boots looking across the Great Glen. The 17 foot high Memorial was designed by Scott Sutherland from Dundee College of Art in 1949, and unveiled by Her Majesty Queen Elizabeth the Queen Mother in 1952. Hundreds of veteran Commandos make the annual pilgrimage to attend the Service of Remembrance and Wreath Laying held at the Memorial in November.

