group: ripptide
name: murney-tower
version: "1"
subfolder: 660-parks
info:
  summary: BSC Murney Tower
  description: |-
    The Murney Redoubt was built in 1846 on the shores of Lake Ontario as part of the defenses of Kingston. By 1890 it was regarded as obsolete by the militia and it was allowed to deteriorate. It was taken over in the early 1920s by the Kingston Historical Society and officially opened as a Museum in 1925. Now a National Historic Site, it is still run by the Kingston Historical Society, welcoming visitors each summer to explore this wonderful piece of Kingston heritage. Bloomfield cannon, carronades and domestic artifacts have been maintained to tell the story of soldiers and families who lived inside.

